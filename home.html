<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>论文精读报告</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        line-height: 1.8;
        color: #333;
        background-color: #fff;
      }

      /* 头部图片 */
      .header-banner img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: cover;
      }

      /* 主内容区域 */
      .content {
        max-width: 800px;
        margin: 60px auto;
        padding: 0 20px;
        text-align: center;
      }

      .content h1 {
        font-size: 24px;
        color: #2c3e50;
        margin-bottom: 20px;
        font-weight: 600;
      }

      .content p {
        font-size: 16px;
        color: #555;
        text-align: justify;
      }

      /* 页脚友情链接 */
      footer {
        background-color: #f9f2e0;
        width: 100%;
        padding: 20px 0;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 80px;
      }

      footer a {
        color: #0066cc;
        text-decoration: none;
        font-size: 16px;
        transition: color 0.3s ease;
      }

      footer a:hover {
        color: #004080;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="header-banner">
      <img src="bioinformatic_cat.png" alt="Banner" />
    </div>

    <div class="content">
      <h1>欢迎大家访问我的网站！</h1>
      <p>
        一直以来我都不太喜欢用幻灯汇报文献，因为幻灯大小有限，每一页都只能放有限的内容，而且幻灯作为一个相对私人的文件很难和一群人共享。而HTML恰好能解决这个问题，故出于一时兴起，我决定尝试用这个网站记录论文精读报告，也许可以带来不一样的报告厅体验。
      </p>
    </div>

    <footer>
      <a href="https://bioinformatics.hrbmu.edu.cn/" target="_blank"
        >友情链接</a
      >
    </footer>
  </body>
</html>
