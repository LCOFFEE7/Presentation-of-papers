<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lta的论文精读报告-首页</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        line-height: 1.8;
        color: #333;
        background-color: #fff;
      }

      /* 头部图片 */
      .header-banner img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: cover;
      }

      /* 主内容区域 */
      .content {
        max-width: 800px;
        margin: 60px auto;
        padding: 0 20px;
        text-align: center;
      }

      .content h1 {
        font-size: 24px;
        color: #2c3e50;
        margin-bottom: 20px;
        font-weight: 600;
      }

      .content p {
        font-size: 16px;
        color: #555;
        text-align: justify;
        text-indent: 2em;
      }

      /* 页脚友情链接 */
      footer {
        background-color: #f9f2e0;
        width: 100%;
        padding: 20px 0;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 80px;
      }

      footer a {
        color: #0066cc;
        text-decoration: none;
        font-size: 16px;
        transition: color 0.3s ease;
      }

      footer a:hover {
        color: #004080;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="header-banner">
      <img src="bioinformatic_cat.png" alt="Banner" />
    </div>

    <div class="content">
      <h1>欢迎大家访问我的网站！</h1>
      <p>
        长久以来，我始终觉得用幻灯片汇报文献存在诸多局限：版面受限、内容承载量有限，且文件私密性强，难以实现便捷共享。而
        HTML
        网页恰好能打破这些束缚，让知识分享更自由、更直观。于是我搭建了这个网站，用于记录论文精读心得，期待能带来一种与众不同、更加开放的学术汇报体验。
      </p>
    </div>

    <div class="content">
      <h1>网站功能</h1>
      <p>
        目前，网站的主要功能是展示论文精读报告目录。每篇报告都包含了对论文的详细分析和个人见解，旨在帮助大家更好地理解和应用这些研究成果。

    </div>

      >
